name: connect.ifuri.com

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install runtime tools
        run: |
          sudo apt-get update
          sudo apt-get install -y php-cli rsync python3-jsonschema

      - name: Validate connector manifests + catalog (JSON Schema)
        run: python3 scripts/validate_connectors.py

      - name: Catalog is up to date (connectors.json matches manifests)
        run: python3 tools/build_catalog.py --check

      - name: Audit connector repositories and versions
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 tools/audit_connector_repos.py --check --warn-missing-tags

      - name: Connector reachability + version pins
        run: python3 scripts/check_connectors.py

      - name: Connector template self-check (scaffold stays schema-valid)
        run: |
          tmp="$(mktemp -d)"
          bash scripts/new-connector.sh template-check tplchk "Template Check" "$tmp/c"
          python3 - "$tmp/c/urirun_connector_template_check/connector.manifest.json" <<'PY'
          import json, sys
          from jsonschema import Draft202012Validator
          errs = list(Draft202012Validator(json.load(open("schema/connector.schema.json"))).iter_errors(json.load(open(sys.argv[1]))))
          print("template manifest valid:", not errs)
          [print(" ", list(e.path), e.message) for e in errs]
          sys.exit(1 if errs else 0)
          PY

      - name: Smoke test
        run: bash tests/smoke.sh

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      PLESK_HOST: ${{ secrets.PLESK_HOST }}
      PLESK_USER: ${{ secrets.PLESK_USER }}
      PLESK_PATH: ${{ secrets.PLESK_PATH }}
      PLESK_SSH_KEY: ${{ secrets.PLESK_SSH_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect deploy secrets
        id: deploy_secrets
        shell: bash
        run: |
          if [[ -n "$PLESK_HOST" && -n "$PLESK_USER" && -n "$PLESK_PATH" && -n "$PLESK_SSH_KEY" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Plesk deploy skipped because one or more PLESK_* secrets are missing."
          fi

      - name: Install deploy tools
        if: steps.deploy_secrets.outputs.enabled == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y php-cli rsync openssh-client

      - name: Configure SSH
        if: steps.deploy_secrets.outputs.enabled == 'true'
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$PLESK_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$PLESK_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to Plesk
        if: steps.deploy_secrets.outputs.enabled == 'true'
        shell: bash
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            ./ "$PLESK_USER@$PLESK_HOST:$PLESK_PATH/"

      - name: Public smoke test
        if: steps.deploy_secrets.outputs.enabled == 'true'
        run: CONNECT_HUB_BASE=https://connect.ifuri.com bash tests/smoke.sh
